# Pre-commit hooks — install with:
#   pre-commit install
#   pre-commit run --all-files  # one-off full check
#
# Keeps commits clean without CI round-trips. The three hooks mirror what
# CI runs, so a green local commit should be a green remote build.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.8
    hooks:
      # Ruff format — replaces black. Runs first so lint sees already-
      # formatted code.
      - id: ruff-format
        args: [--config=stage3_experiments/pyproject.toml]
        files: ^stage3_experiments/
      # Ruff lint — covers pyflakes, pycodestyle, isort, bugbear, etc.
      - id: ruff
        args: [--fix, --config=stage3_experiments/pyproject.toml]
        files: ^stage3_experiments/

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        # Mypy needs the actual deps to type-check. We list
        # `types-requests` (the only stub-only package we use) and
        # the core numeric/ML packages. Third-party libs without
        # stubs (torch, sklearn, mlflow, sksurv, lifelines) are
        # covered by `ignore_missing_imports` in pyproject.toml.
        additional_dependencies:
          - types-requests
          - numpy>=1.26
          - pandas-stubs
        args:
          - --config-file=stage3_experiments/pyproject.toml
        files: ^stage3_experiments/src/
