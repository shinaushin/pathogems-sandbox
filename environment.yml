# Conda environment for the PathoGems auto-research agent.
#
# Create with:   conda env create -f environment.yml
# Update with:   conda env update -f environment.yml --prune
# Activate with: conda activate pathogems
#
# Pinning philosophy: pin major.minor for reproducibility, leave patch open so
# security fixes flow in. CUDA/torch is left as CPU-only here so the env builds
# on any machine; swap in the appropriate pytorch-cuda meta-package locally if
# you have a GPU.
name: pathogems
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip

  # ---- Core scientific stack ----
  - numpy=1.26.*
  - pandas=2.2.*
  - scipy=1.13.*
  - scikit-learn=1.4.*

  # ---- Deep learning (CPU build; swap for pytorch-cuda locally if needed) ----
  - pytorch=2.2.*
  - cpuonly

  # ---- Survival analysis (Harrell's C-index, IBS, Kaplan-Meier) ----
  - lifelines=0.28.*

  # ---- HTTP / data fetching ----
  - requests=2.31.*

  # ---- Dev tooling ----
  - pytest=8.*
  - pytest-cov=5.*
  - mypy=1.10.*
  - ruff=0.4.*
  - types-requests

  # ---- Packages only on PyPI ----
  - pip:
      - anthropic>=0.30.0           # Claude SDK for Stage 1 and Stage 4 agents
      - scikit-survival==0.22.*     # Cox utilities & reference C-index impl
      - mlflow>=2.12,<3.0           # Experiment tracking (ADR 0008)
