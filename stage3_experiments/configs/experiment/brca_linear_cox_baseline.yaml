# @package _global_
name: brca_linear_cox_baseline
model: linear_cox
lr: 1.0e-03
weight_decay: 1.0e-03
epochs: 200
early_stopping_patience: 15
enable_mlflow: true
notes: "Baseline-of-the-baseline: linear Cox (no hidden layers). Higher lr and weight_decay than omics_mlp because there is no BN/dropout to regularize. hidden_dims/dropout/use_batchnorm are ignored by the LinearCox factory; left at baseline values to make this config a minimal diff of brca_omics_baseline.json."
