# Continuous integration for the PathoGems Stage 3 experiment harness.
#
# Runs on every push and PR to master. Six parallel jobs:
#   1. lint       — ruff format + lint (fast, no conda).
#   2. typecheck  — mypy inside the conda env (sees real package types).
#   3. test       — pytest with coverage gate; includes the slow end-to-end
#                   smoke test (test_smoke_end_to_end.py, ~5-10s on CPU).
#   4. security   — pip-audit CVE scan of all installed dependencies.
#   5. dep-pins   — verify environment.yml and pyproject.toml pins don't conflict.
#   6. schema     — validate that a freshly-written run log matches run_log_v1.json
#                   (covered by tests in job 3, but called out explicitly here).
name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # 1. Lint + format
  # ---------------------------------------------------------------------------
  lint:
    name: Ruff lint + format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install "ruff==0.4.8"
      - name: Ruff format check
        run: ruff format --check --diff --config stage3_experiments/pyproject.toml stage3_experiments/
      - name: Ruff lint
        # --diff shows a unified diff for every auto-fixable violation (e.g. I001
        # import ordering) so CI output tells you exactly what to change.
        run: ruff check --diff --config stage3_experiments/pyproject.toml stage3_experiments/

  # ---------------------------------------------------------------------------
  # 2. Type check
  # ---------------------------------------------------------------------------
  typecheck:
    name: Mypy
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v4
      # Mypy needs to see the actual packages (torch, numpy, pandas, sklearn)
      # to type-check imports and attribute accesses. Running it outside the
      # conda env with only stub packages misses too much and produces a wall
      # of import-not-found noise. Using the full conda env is slower (~2 min)
      # but gives meaningful results.
      - uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment.yml
          activate-environment: pathogems
          auto-activate-base: false
          miniforge-version: latest
      - name: Install package (needed for intra-package imports)
        run: |
          cd stage3_experiments
          pip install -e .
      - name: Run mypy
        run: mypy --config-file stage3_experiments/pyproject.toml stage3_experiments/src/

  # ---------------------------------------------------------------------------
  # 3. Tests + coverage gate
  #
  # Runs ALL tests, including the slow end-to-end smoke test
  # (test_smoke_end_to_end.py). The smoke test uses a tiny synthetic cohort
  # (~5-10 s on CPU) and asserts the full harness recovers a C-index > 0.55
  # from injected linear Cox signal. If it ever becomes flaky, move it to a
  # nightly job gated by `pytest -m slow`.
  #
  # Coverage is measured over `pathogems` source only and must stay >= 80 %.
  # The threshold is intentionally conservative — research codebases have
  # branches that are hard to exercise in unit tests (GPU paths, OS errors,
  # optional MLflow code). Raise it as the test suite matures.
  # ---------------------------------------------------------------------------
  test:
    name: Pytest + coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v4
      - uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment.yml
          activate-environment: pathogems
          auto-activate-base: false
          miniforge-version: latest
      - name: Install package in editable mode
        run: |
          cd stage3_experiments
          pip install -e .
      - name: Run tests (including slow smoke test) with coverage
        run: |
          pytest stage3_experiments/tests -v --tb=short \
            --cov=pathogems \
            --cov-config=stage3_experiments/pyproject.toml \
            --cov-report=term-missing \
            --cov-fail-under=80

  # ---------------------------------------------------------------------------
  # 4. Security — CVE scan
  #
  # pip-audit checks every installed package against the OSV and PyPI advisory
  # databases. Fails if any package has a known vulnerability with a published
  # fix (i.e., a patched version exists). The editable install (`-e .`) pulls
  # in all runtime deps declared in pyproject.toml, so transitive deps are
  # covered too.
  #
  # If pip-audit reports a false positive or a vuln in a dep we can't upgrade
  # yet, add it to the ignore list:
  #   pip-audit --ignore-vuln GHSA-xxxx-yyyy-zzzz
  # ---------------------------------------------------------------------------
  security:
    name: pip-audit (CVE scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package and pip-audit
        run: |
          pip install -e stage3_experiments/
          pip install "pip-audit>=2.7,<3.0"
      - name: Scan for known vulnerabilities
        # --skip-editable: pathogems itself won't appear in any CVE database;
        # only its transitive dependencies matter here.
        #
        # CVE-2026-3219: vulnerability in pip itself (the package manager, not a
        # project dependency). pip-audit reports no fix version, so there is no
        # patched release to upgrade to. This affects the pip binary used by the
        # CI runner and cannot be remediated by changing pyproject.toml or
        # environment.yml. Suppress until a fixed pip version is published.
        # Tracked: https://www.cve.org/CVERecord?id=CVE-2026-3219
        # TODO: remove --ignore-vuln once pip releases a patched version.
        run: pip-audit --skip-editable --ignore-vuln CVE-2026-3219

  # ---------------------------------------------------------------------------
  # 5. Dependency pin consistency
  #
  # Checks that environment.yml upper-bound caps don't exclude the minimum
  # versions required by pyproject.toml. The dangerous drift pattern: someone
  # bumps pyproject.toml to "numpy>=1.27" but forgets to update environment.yml
  # which still caps at "<1.27". The conda env resolves to 1.26.x, production
  # pip installs require 1.27+, mismatch goes unnoticed until a user hits it.
  # ---------------------------------------------------------------------------
  dep-pins:
    name: Dependency pin consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pyyaml (needed to parse environment.yml)
        run: pip install pyyaml
      - name: Check pins
        run: python stage3_experiments/scripts/check_dep_pins.py
